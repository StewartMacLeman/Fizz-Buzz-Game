<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="author" content="Stewart MacLeman">
    <meta name="description" content="This is a version of the game Fizz Buzz.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/fizz_buzz.css">
    <script src="scripts/fizz_buzz.js" defer></script>


    <title>Fizz Buzz</title>
  </head>

  <body>
    <header>
      <h1>Fizz / Buzz</h1>
      <div class="instructions">
        <ol>
          <li>Select the type of game.</li>
          <li>Hit the start buttons.</li>
          <li>Hit the reset button to begin again.</li>
        </ol>
      </div>
    </header>

    <section class="num_display_container">
      <p id="num_display">Number Display!</p>
    </section>

    <section class="fizz_buzz_btn_cont">
      <button type="button" class="btn_class" id="none_btn" disabled>None</button>
      <button type="button" class="btn_class" id="fizz_btn" disabled>Fizz</button>
      <button type="button" class="btn_class" id="buzz_btn" disabled>Buzz</button>
      <button type="button" class="btn_class" id="fizz_buzz_btn" disabled>Fizz-Buzz</button>
    </section>

    <section class="answer_display_container">
      <p id="answer_display">Choose a game type from below!</p>
    </section>

    <section class="answer_display_container">
        <button type="button" class="next_btn_class" id="next_btn" disabled>-</button>
        <button type="button" class="next_btn_class_2" id="next_btn_2">Next Number!</button>
    </section>

    <section class="start_reset_btn_cont">
      <button type="button" class="btn_class" id="count_start">Start Counter</button>
      <button type="button" class="btn_class" id="random_start">Start Random</button>
      <button type="button" class="btn_class" id="reset_btn">Reset Games</button>
    </section>


  </body>
</html>
